<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>math gym — ankita</title>
  <link rel="icon" type="image/png" href="kuromi.png"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .name-role-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 0;
      color: var(--muted);
      gap: 0.8rem;
    }
    .coming-soon .big {
      font-size: 4rem;
      opacity: 0.6;
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      color: var(--accent);
    }
    .coming-soon .label {
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .coming-soon .sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div id="nav-slot" data-page="math gym"></div>

  <div class="coming-soon">
    <div class="big">∑</div>
    <div class="label">math gym</div>
    <div class="sub">coming soon</div>
  </div>

</div>

<div class="music-bar paused" id="music-bar" onclick="toggleMusic()">
  <div class="music-viz">
    <span></span><span></span><span></span><span></span>
  </div>
  <span class="music-label">tron legacy · daft punk</span>
  <button class="music-btn" id="music-btn">▶</button>
</div>

<audio id="bg-audio" src="tron.mp3" loop></audio>

<script src="nav.js"></script>
<script>
function toggleMusic() {
  const audio = document.getElementById("bg-audio");
  const bar = document.getElementById("music-bar");
  const btn = document.getElementById("music-btn");
  if (audio.paused) {
    audio.play();
    bar.classList.remove("paused");
    btn.textContent = "⏸";
  } else {
    audio.pause();
    bar.classList.add("paused");
    btn.textContent = "▶";
  }
}
</script>
</body>
</html>
