<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>afraidoftime</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #00ffff;
      --accent-dim: rgba(0,255,255,0.07);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* subtle scanline texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(480px, 92vw);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 20px rgba(0,255,255,0.25);
      margin-bottom: 1.4rem;
      overflow: hidden;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 16px rgba(0,255,255,0.2); }
      50%       { box-shadow: 0 0 32px rgba(0,255,255,0.45); }
    }

    /* Name */
    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .handle {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }

    .bio {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
      max-width: 340px;
      margin-bottom: 2rem;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 1.6rem;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .link:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateX(3px);
    }

    .link-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.75;
    }

    .link-label { flex: 1; }

    .link-arrow {
      font-size: 0.65rem;
      color: var(--muted);
      transition: color 0.2s;
    }

    .link:hover .link-arrow { color: var(--accent); }

    .video-wrap {
      width: 100%;
      margin-top: 1.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .video-wrap video {
      width: 100%;
      display: block;
      max-height: 280px;
      object-fit: cover;
      background: #000;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      font-size: 0.62rem;
      color: #2a2a2a;
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* Blink cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 3px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
